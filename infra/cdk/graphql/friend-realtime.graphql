input PublishChatRealtimeEventInput {
  eventId: ID!
  type: String!
  targetUserId: ID!
  conversationId: ID
  message: PublishChatRealtimeMessageInput
  receipt: PublishChatRealtimeReceiptInput
  typing: PublishChatRealtimeTypingInput
  presence: PublishChatRealtimePresenceInput
  createdAt: AWSDateTime!
}

type Mutation {
  publishFriendRealtimeEvent(input: PublishFriendRealtimeEventInput!): FriendRealtimeEvent @aws_iam
  publishFriendRequestReceived(input: PublishFriendRequestReceivedInput!): FriendRequestRealtimeEvent @aws_iam
  publishFriendRequestCanceled(input: PublishFriendRequestCanceledInput!): FriendRequestRealtimeEvent @aws_iam
  publishChatRealtimeEvent(input: PublishChatRealtimeEventInput!): ChatRealtimeEvent @aws_iam
}

type Subscription {
  onFriendRealtimeEvent(targetUserId: ID!): FriendRealtimeEvent
    @aws_subscribe(mutations: ["publishFriendRealtimeEvent"])
    @aws_cognito_user_pools
  onFriendRequestReceived(targetUserId: ID!): FriendRequestRealtimeEvent
    @aws_subscribe(mutations: ["publishFriendRequestReceived"])
    @aws_cognito_user_pools
  onFriendRequestCanceled(targetUserId: ID!): FriendRequestRealtimeEvent
    @aws_subscribe(mutations: ["publishFriendRequestCanceled"])
    @aws_cognito_user_pools
  onChatRealtimeEvent(targetUserId: ID!): ChatRealtimeEvent
    @aws_subscribe(mutations: ["publishChatRealtimeEvent"])
    @aws_cognito_user_pools
}
