input PublishFriendRealtimeEventInput {
  eventId: ID!
  type: String!
  targetUserId: ID!
  actorUserId: ID!
  relatedUserId: ID!
  actorName: String!
  actorUsername: String
  actorAvatarUrl: String
  createdAt: AWSDateTime!
}

input PublishFriendRequestReceivedInput {
  eventId: ID!
  type: String!
  targetUserId: ID!
  requesterId: ID!
  requesterName: String!
  requesterUsername: String
  requesterAvatarUrl: String
  createdAt: AWSDateTime!
}

input PublishFriendRequestCanceledInput {
  eventId: ID!
  type: String!
  targetUserId: ID!
  requesterId: ID!
  requesterName: String!
  requesterUsername: String
  requesterAvatarUrl: String
  createdAt: AWSDateTime!
}

input PublishChatRealtimeMessageInput {
  id: ID!
  conversationId: ID!
  senderId: ID!
  clientMessageId: String!
  body: String!
  status: String!
  createdAt: AWSDateTime!
}

input PublishChatRealtimeReceiptInput {
  conversationId: ID!
  messageId: ID!
  userId: ID!
  deliveredAt: AWSDateTime
  readAt: AWSDateTime
}

input PublishChatRealtimeTypingInput {
  conversationId: ID!
  userId: ID!
  isTyping: Boolean!
}

input PublishChatRealtimePresenceInput {
  userId: ID!
  status: String!
  lastSeenAt: AWSDateTime!
