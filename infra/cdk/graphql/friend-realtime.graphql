schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}

type Query {
  noop: String @aws_iam @aws_cognito_user_pools
}

type FriendRealtimeEvent @aws_iam @aws_cognito_user_pools {
  eventId: ID!
  type: String!
  targetUserId: ID!
  actorUserId: ID!
  relatedUserId: ID!
  actorName: String!
  actorUsername: String
  actorAvatarUrl: String
  createdAt: AWSDateTime!
}

