type ChatRealtimeEvent @aws_iam @aws_cognito_user_pools {
  eventId: ID!
  type: String!
  targetUserId: ID!
  conversationId: ID
  message: ChatRealtimeMessage
  receipt: ChatRealtimeReceipt
  typing: ChatRealtimeTyping
  presence: ChatRealtimePresence
